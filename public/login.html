<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
   <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Login</title>
    
</head>
<body>
    <section class="login-content">
        <div class="login-info-left">
            <div class="login-form">
            <h1>Welcome Back!</h1>
            <p>Enter your Credentials to access your account</p>
            <form id="loginForm">
         <label for="email">Email:</label><br>
    <input
        type="email"
        id="email"
        name="email"
        placeholder="Enter Your Email"
        required
    >
         <label for="password">Password:</label><br>
    <input
        type="password"
        id="password"
        name="password"
        placeholder="Enter Your Password"
        required
    >
          <button type="submit" class="login">Login</button>
 <div class="or">Or</div>
             <div class="social">
        <button>
            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" width="18">
            Sign in with Google
        </button>
        <button>
             <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/apple/apple-original.svg" width="18">
            Sign in with Apple
        </button>
    </div>
    <p>Don't have an account?<a href="signup.html">Sign Up</a></p>
            </form>
        </div>
        </div>
        <div class="login-info-right">
            <img src="images/Spiral Ratatouille.jpeg">
        </div>
    </section>
    <script src="js/script.js"></script>
</body>
</html>
