<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
     <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="images/logo.png">
</head>
<body>
    <section class="login-content">
        <div class="login-info-left">
            <div class="login-form">
            <h1>Get Start Now</h1>
            <form id="signupForm">
        <label for="name">Name:</label>
<input type="text" id="name" name="fullname" placeholder="Enter Your Name" required>

<label for="email">Email:</label>
<input type="email" id="email" name="email" placeholder="Enter Your Email" required>

<label for="password">Password:</label>
<input type="password" id="password" name="password" placeholder="Enter Your Password" required>

<label for="confirmPassword">Confirm Password:</label>
<input type="password" id="confirmPassword" placeholder="Confirm Password" required>
          <button type="submit" class="login">Sign Up</button>
 <div class="or">Or</div>
             <div class="social">
        <button type="button">
            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" width="18">
            Sign in with Google
        </button>
        <button type="button">
             <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/apple/apple-original.svg" width="18">
            Sign in with Apple
        </button>
    </div>
    <p>Have an account?<a href="login.html">Login</a></p>
    </form>
        </div>
        </div>
        <div class="login-info-right">
            <img src="images/Learn how to make zucchini rollatini! This vegetarian Italian recipe is full of flavor, melted Italian cheeses, and fresh herbs_ You'll love every bite!.jpeg">
        </div>
    </section>
    <script src="js/script.js"></script>
</body>
</html>
