<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
      <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="/images/logo.png">
</head>
<body>
    <section class="login-content">
        <div class="login-info-left">
            <div class="login-form">
            <h1>Get Start Now</h1>
            <form>
        <label for="name">Name:</label><br>
          <input type="text" id="name" name="name" required placeholder="Enter Your Name"> <br><br>   
        <label for="name">Email:</label><br>
          <input type="email" id="email" name="email" required placeholder="Enter Your Email"> <br><br>
        <label for="email">Password:</label><br>
          <input type="password" id="password" name="password" required placeholder="Enter Your Password"> <br><br>
        <label for="email">Confirm Password:</label><br>
          <input type="password" id="password" name="password" required placeholder="Enter Confirm Password"> <br><br>
          <button type="submit" class="login">Sign Up</button>
 <div class="or">Or</div>
             <div class="social">
        <button>
            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" width="18">
            Sign in with Google
        </button>
        <button>
             <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/apple/apple-original.svg" width="18">
            Sign in with Apple
        </button>
    </div>
    <p>Have an account?<a href="login.html">Login</a></p>
    </form>
        </div>
        </div>
        <div class="login-info-right">
            <img src="images/Learn how to make zucchini rollatini! This vegetarian Italian recipe is full of flavor, melted Italian cheeses, and fresh herbs_ You'll love every bite!.jpeg">
        </div>

    </section>
</body>
</html>
